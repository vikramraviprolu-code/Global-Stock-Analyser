name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint (ruff)
        run: ruff check . --output-format=github
        continue-on-error: true

      - name: Import smoke test
        run: |
          python -c "import app, analyzer, market_data, markets, resolver; print('imports OK')"
          python -c "import calc, providers, screener, models; print('packages OK')"

      - name: Run tests
        run: pytest tests/ -q

  version-sync:
    # Strict — fails the build if README / SECURITY / CHANGELOG / app.py
    # version pins are out of step with pyproject.toml. See RELEASING.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate version pins are in sync
        run: bash scripts/check_version_sync.sh

  bundle-budgets:
    # Enforce JS / CSS bundle size budgets from PERFORMANCE.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate bundle sizes
        run: bash scripts/check_bundle_sizes.sh

  dependency-audit:
    # Runs pip-audit against requirements.txt. Pending upstream CVEs
    # (no PyPI fix yet) are allow-listed in scripts/audit_dependencies.sh
    # — drop entries when patched releases land. See SECURITY.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pip-audit + project deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit
      - name: Run dependency audit
        run: bash scripts/audit_dependencies.sh
